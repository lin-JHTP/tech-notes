site_name: Tech Notes
site_description: 📚 个人技术知识库 | 嵌入式 · 充电桩 · AI · CS基础 · 工具
site_author: lin-JHTP
site_url: https://lin-JHTP.github.io/tech-notes/

repo_name: lin-JHTP/tech-notes
repo_url: https://github.com/lin-JHTP/tech-notes

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      title: 本页目录

plugins:
  - search:
      lang: zh
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lin-JHTP

nav:
