    - FreeRTOS实战笔记: 01-embedded/freertos-practical-notes.md
    - 串口与DMA调试经验: 01-embedded/uart-dma-debug.md
    - 嵌入式C编程规范: 01-embedded/embedded-c-coding-style.md
    - 待补充清单: 01-embedded/TODO.md
  - 充电桩技术:
    - 02-charging-pile/index.md
    - OCPP协议深度解析: 02-charging-pile/ocpp-protocol-deep-dive.md
    - 充电桩安全业务设计: 02-charging-pile/charging-safety-design.md
