# ============================================================
# GitHub Actions 自动部署 Workflow
# 功能：在主分支（main）push 时，自动构建 MkDocs Material 站点
#       并发布至 GitHub Pages
# ============================================================

name: 📚 部署 MkDocs 到 GitHub Pages

on:
  # 主分支 push 时触发自动部署
  push:
    branches:
      - main

  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行，避免并发冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: 构建 MkDocs 站点
  # ─────────────────────────────────────────────────────────
  build:
    name: 🔨 构建站点
    runs-on: ubuntu-latest

    steps:
      # 1. 检出仓库代码
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          # 获取完整历史，用于 git-revision-date 等插件
          fetch-depth: 0

      # 2. 配置 Python 环境
      - name: 🐍 配置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # 3. 安装 MkDocs 及相关依赖
      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 构建站点（输出到 ./site 目录）
      - name: 🏗️ 构建 MkDocs 站点
        run: mkdocs build --strict --verbose

      # 5. 上传构建产物供后续部署使用
      - name: 📤 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  # ─────────────────────────────────────────────────────────
  # Job 2: 部署到 GitHub Pages
  # ─────────────────────────────────────────────────────────
  deploy:
    name: 🚀 部署到 GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    # 部署环境配置（GitHub Pages 专用）
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 部署到 GitHub Pages
      - name: 🌐 部署站点
        id: deployment
        uses: actions/deploy-pages@v4
